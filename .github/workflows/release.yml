name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release app
        run: |
          DERIVED_DIR="$RUNNER_TEMP/derived-release"
          xcodebuild -project 'Bar Tasker.xcodeproj' \
            -scheme 'Bar Tasker' \
            -configuration Release \
            -derivedDataPath "$DERIVED_DIR" \
            -destination 'platform=macOS' \
            build

          APP_PATH="$DERIVED_DIR/Build/Products/Release/Bar Tasker.app"
          mkdir -p dist
          cp -R "$APP_PATH" "dist/Bar Tasker.app"

      - name: Package DMG
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          STAGE_DIR="$RUNNER_TEMP/dmg-stage"
          mkdir -p "$STAGE_DIR"
          cp -R "dist/Bar Tasker.app" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"

          DMG_PATH="dist/bar-tasker-v${VERSION}.dmg"
          hdiutil create \
            -volname "Bar Tasker" \
            -srcfolder "$STAGE_DIR" \
            -format UDZO \
            "$DMG_PATH"

          shasum -a 256 "$DMG_PATH" > "${DMG_PATH}.sha256"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          append_body: true
          body: |
            Release assets generated by CI:
            - bar-tasker-v${{ steps.version.outputs.version }}.dmg
            - bar-tasker-v${{ steps.version.outputs.version }}.dmg.sha256
          files: |
            dist/bar-tasker-v${{ steps.version.outputs.version }}.dmg
            dist/bar-tasker-v${{ steps.version.outputs.version }}.dmg.sha256
