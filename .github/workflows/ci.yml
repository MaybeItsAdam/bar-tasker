name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "release/**"

jobs:
  swift-tests:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run swift tests
        run: swift test

  macos-build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          xcodebuild -project 'checkvist focus.xcodeproj' \
            -scheme 'checkvist focus' \
            -configuration Debug \
            -destination 'platform=macOS' \
            build
