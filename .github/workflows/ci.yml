name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "release/**"

jobs:
  swift-tests:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run swift tests
        run: swift test

  macos-build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: |
          xcodebuild -project 'checkvist focus.xcodeproj' \
            -scheme 'checkvist focus' \
            -configuration Debug \
            -destination 'platform=macOS' \
            build
